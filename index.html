<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carte Normandie</title>

    <!-- Inclusion de leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@drustack/leaflet.resetview/dist/L.Control.ResetView.min.css">

    <link rel="stylesheet" href="css/style.css" />
    
</head>
<body>

    <h2>Carte de la Normandie</h2>

    <select id="indicateur">
        <option value="">-- Choisissez un indicateur --</option>
    </select>

    <script>
        fetch("json/indicateurs.json")
        .then(r => r.json())
        .then(indicateurs => {
            const select = document.getElementById("indicateur");
            indicateurs.forEach(fichier => {
                const option = document.createElement("option");
                option.value = fichier;
                //option.textContent = fichier.replace(".json", "");
                option.textContent = formatLabel(fichier);

                select.appendChild(option);
            });
        });

        function formatLabel(filename) {
        let name = filename.replace(".json", "");
        let parts = name.split("_");

        // Détection année
        let last = parts[parts.length - 1];
        let year = /^\d{4}$/.test(last) ? parts.pop() : null;

        let base = parts.join("_");

        // Dictionnaire des libellés
        const labels = {
            banques: "Banques",
            bassins_natation: "Bassins de natation",
            boulangeries: "Boulangeries",
            colleges: "Collèges",
            creations_entreprises: "Créations d’entreprises",
            deces: "Décès",
            densite_hist: "Densité de population",
            dentistes: "Dentistes",
            eaje: "Établissements d’accueil petite enfance",
            ecoles: "Écoles",
            effectifs_salaries: "Effectifs salariés",
            electeurs: "Électeurs",
            emplois_lt: "Emplois locaux",
            etablissements: "Établissements",
            evol_pop: "Évolution de la population",
            evol_pop_solde_migratoire: "Solde migratoire",
            evol_pop_solde_naturel: "Solde naturel",
            flux_domicile_etude: "Flux domicile → étude",
            flux_domicile_travail: "Flux domicile → travail",
            flux_migration: "Flux migratoires",
            grandes_surfaces: "Grandes surfaces",
            hebergement_personnes_agees: "Hébergement personnes âgées",
            infirmiers: "Infirmiers",
            kines: "Kinésithérapeutes",
            logements: "Logements",
            lycees: "Lycées",
            medecins: "Médecins",
            mediane_niveau_vie: "Médiane du niveau de vie",
            menages_fiscaux: "Ménages fiscaux",
            naissances: "Naissances",
            nb_75plus: "Personnes de 75 ans et plus",
            nb_menages: "Nombre de ménages",
            nb_non_scolarises: "Non scolarisés",
            part: "Part",
            pharmacies: "Pharmacies",
            police_gendarmerie: "Police / Gendarmerie",
            population: "Population",
            population_hist: "Population historique",
            residences_principales: "Résidences principales",
            salles_multisports: "Salles multisports",
            superettes: "Supérettes",
            sur_occupation: "Sur-occupation des logements",
            taux_activite_1: "Taux d’activité 1",
            taux_activite_2: "Taux d’activité 2",
            taux_activite_3: "Taux d’activité 3",
            taux_activite_4: "Taux d’activité 4",
            taux_emploi_femmes_25_54: "Taux d’emploi femmes 25–54 ans",
            taux_emploi_hommes_25_54: "Taux d’emploi hommes 25–54 ans",
            taux_mortalite: "Taux de mortalité",
            taux_natalite: "Taux de natalité",
            urgences: "Urgences"
        };

        // Détection du libellé
        let label = labels[base] || base.replace(/_/g, " ");

        // Détection unité
        let unit = null;

        if (base.startsWith("taux_") || base.startsWith("part_") || base.endsWith("_pct") || base === "sur_occupation") {
            unit = "%";
        }

        if (base.includes("niveau_vie") || base.includes("revenu")) {
            unit = "€";
        }

        if (base.includes("densite")) {
            unit = "hab./km²";
        }

        // Ajout année
        if (year) label += " (" + year + ")";

        // Ajout unité
        if (unit) label += " (" + unit + ")";

        return label;
    }


    </script>

    <div id="map"></div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@drustack/leaflet.resetview/dist/L.Control.ResetView.min.js"></script>
    <script src="js/carte.js"></script>

</body>
</html>
