<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carte Normandie</title>

    <!-- Inclusion de leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <link rel="stylesheet" href="css/style.css" />
    
</head>
<body>

    <h2>Carte de la Normandie</h2>

    <select id="indicateur">
        <option value="">-- Choisissez un indicateur --</option>
    </select>

    <script>
        fetch("json/indicateurs.json")
        .then(r => r.json())
        .then(indicateurs => {
            const select = document.getElementById("indicateur");
            indicateurs.forEach(fichier => {
                const option = document.createElement("option");
                option.value = fichier;
                option.textContent = fichier.replace(".json", "");
                select.appendChild(option);
            });
        });
    </script>

    <div id="map"></div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="js/carte.js"></script>

</body>
</html>
